<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FXLotSize</title>
    <meta name="description" content="Get in touch with the FXLotSize team for feedback, support, or inquiries.">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem 4rem;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }
        .back-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .back-link:hover { text-decoration: underline; }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem; }

        .direct-email-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .email-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .email-address {
            color: var(--accent);
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
        }
        .email-address:hover { text-decoration: underline; }

        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        button {
            width: 100%;
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 0.9rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Back to FXLotSize Calculator</a>
        <div class="header">
            <h1>Contact Us</h1>
            <p>Have questions, feature requests, or feedback? Send us a message or reach out via email.</p>
        </div>

        <!-- Direct Email Card -->
        <div class="direct-email-box">
            <div>
                <div class="email-label">Direct Support Email</div>
                <a href="mailto:info@fxlotsize.com" class="email-address">info@fxlotsize.com</a>
            </div>
            <a href="mailto:info@fxlotsize.com" style="background: rgba(16, 185, 129, 0.2); color: var(--accent); padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600;">Send Email &rarr;</a>
        </div>

        <!-- Working Contact Form (via FormSubmit) -->
        <form action="https://formsubmit.co/info@fxlotsize.com" method="POST">
            <!-- FormSubmit Configurations -->
            <input type="hidden" name="_subject" value="New Inquiry from FXLotSize Contact Form">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>

        <footer>
            &copy; 2026 FXLotSize. All rights reserved.
        </footer>
    </div>
</body>
</html>
